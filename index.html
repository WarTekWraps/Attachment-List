<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GBI Equipment List</title>
  <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"%3E%3Cpath fill="%23000" d="M4 4h2l3 9h6.5c.6 0 1.2-.3 1.6-.8L20 9.2 21 8l-2.2-1.3-2.8 4.1c-.2.3-.5.5-.9.5H12L9 4H4zm3.5 11.5H9V19H7.5v-3.5zm3 0H12V19h-1.5v-3.5zm3 0H15V19h-1.5v-3.5z"/%3E%3C/svg%3E' />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#059669">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="GBI Equipment">
  <link rel="apple-touch-icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"%3E%3Crect width="192" height="192" fill="%23111827"/%3E%3Cpath fill="%23ffffff" d="M48 48h24l36 108h78c7.2 0 14.4-3.6 19.2-9.6L240 110.4 252 96l-26.4-15.6-33.6 49.2c-2.4 3.6-6 6-10.8 6H144L108 48H48zm42 138H108v42H90v-42zm36 0H144v42h-18v-42zm36 0H180v42h-18v-42z"/%3E%3C/svg%3E'>
  <link rel="apple-touch-startup-image" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"%3E%3Crect width="192" height="192" fill="%23111827"/%3E%3Cpath fill="%23ffffff" d="M48 48h24l36 108h78c7.2 0 14.4-3.6 19.2-9.6L240 110.4 252 96l-26.4-15.6-33.6 49.2c-2.4 3.6-6 6-10.8 6H144L108 48H48zm42 138H108v42H90v-42zm36 0H144v42h-18v-42zm36 0H180v42h-18v-42z"/%3E%3C/svg%3E'>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    /* Improve mobile editing experience */
    td[contenteditable="true"]:focus {
      background-color: #f0f9ff;
      outline: 2px solid #0ea5e9;
      outline-offset: -2px;
    }
    
    /* Search highlighting */
    .search-highlight {
      background-color: #fef08a;
      padding: 1px 2px;
      border-radius: 2px;
      font-weight: 500;
    }
    
    /* Better touch targets on mobile */
    @media (max-width: 640px) {
      td[contenteditable="true"] {
        min-height: 48px;
        display: flex;
        align-items: center;
      }
      
      button {
        font-size: 16px; /* Prevents zoom on iOS */
      }
      
      input[type="file"] {
        font-size: 16px;
      }
      
      /* Search input optimizations for mobile */
      #search-input {
        font-size: 16px; /* Prevents zoom on iOS */
        -webkit-appearance: none;
        border-radius: 8px;
      }
      
      #search-input:focus {
        border-color: #059669;
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
      }
      
      #clear-search {
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }
    
    /* Prevent horizontal scroll on very small screens */
    @media (max-width: 480px) {
      .overflow-x-auto {
        overflow-x: scroll;
        -webkit-overflow-scrolling: touch;
      }
    }
    
    /* Portrait mobile view: Show only Equip, Description, Location and Actions */
    @media (max-width: 640px) and (orientation: portrait) {
      /* Hide VIN, Job, and Status columns (3rd, 4th, 5th columns) */
      table thead tr th:nth-child(3),
      table thead tr th:nth-child(4), 
      table thead tr th:nth-child(5),
      table tbody tr td:nth-child(3),
      table tbody tr td:nth-child(4),
      table tbody tr td:nth-child(5) {
        display: none !important;
      }
      
      /* Optimize remaining column widths */
      table thead tr th:nth-child(1), /* Equip */
      table tbody tr td:nth-child(1) {
        width: 20%;
        min-width: 80px;
      }
      
      table thead tr th:nth-child(2), /* Description */
      table tbody tr td:nth-child(2) {
        width: 40%;
        min-width: 120px;
      }
      
      table thead tr th:nth-child(6), /* Location */
      table tbody tr td:nth-child(6) {
        width: 25%;
        min-width: 100px;
      }
      
      table thead tr th:nth-child(7), /* Actions */
      table tbody tr td:nth-child(7) {
        width: 15%;
        min-width: 100px;
      }
      
      /* Ensure table doesn't overflow */
      .min-w-full {
        min-width: 100% !important;
        width: 100% !important;
      }
    }
    
    /* Additional fallback for very small screens regardless of orientation */
    @media (max-width: 480px) {
      /* Hide VIN, Job, and Status columns on very small screens */
      table thead tr th:nth-child(3),
      table thead tr th:nth-child(4), 
      table thead tr th:nth-child(5),
      table tbody tr td:nth-child(3),
      table tbody tr td:nth-child(4),
      table tbody tr td:nth-child(5) {
        display: none !important;
      }
      
      /* Optimize remaining columns for small screens */
      table thead tr th:nth-child(1),
      table tbody tr td:nth-child(1) {
        width: 18%;
        min-width: 60px;
        font-size: 12px;
      }
      
      table thead tr th:nth-child(2),
      table tbody tr td:nth-child(2) {
        width: 42%;
        min-width: 100px;
        font-size: 12px;
      }
      
      table thead tr th:nth-child(6),
      table tbody tr td:nth-child(6) {
        width: 25%;
        min-width: 80px;
        font-size: 12px;
      }
      
      table thead tr th:nth-child(7),
      table tbody tr td:nth-child(7) {
        width: 15%;
        min-width: 90px;
      }
    }
    
    /* Ensure download button is always visible on mobile */
    .download-app-btn {
      position: fixed !important;
      bottom: 24px !important;
      left: 50% !important;
      transform: translateX(-50%) !important;
      z-index: 9999 !important;
      pointer-events: auto !important;
      touch-action: manipulation !important;
      -webkit-tap-highlight-color: transparent !important;
    }
    
    /* Ensure proper spacing for download button */
    @media (max-width: 640px) {
      body {
        padding-bottom: 80px;
      }
      
      .download-app-btn {
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3) !important;
        border: none !important;
        outline: none !important;
      }
      
      .download-app-btn:focus {
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 0 0 0 3px rgba(5, 150, 105, 0.3) !important;
      }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <header class="bg-gray-900 text-white p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
    <div class="flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-8 h-8 flex-shrink-0" fill="currentColor" aria-hidden="true">
        <path d="M4 4h2l3 9h6.5c.6 0 1.2-.3 1.6-.8L20 9.2 21 8l-2.2-1.3-2.8 4.1c-.2.3-.5.5-.9.5H12L9 4H4zm3.5 11.5H9V19H7.5v-3.5zm3 0H12V19h-1.5v-3.5zm3 0H15V19h-1.5v-3.5z"/>
      </svg>
      <h1 class="font-bold text-lg sm:text-xl">GBI Equipment List</h1>
    </div>
    <div class="flex gap-2 w-full sm:w-auto">
      <button id="header-install-btn" class="bg-blue-600 px-4 py-2 rounded text-sm min-h-[44px] flex-1 sm:flex-initial whitespace-nowrap hidden">
        📱 Install App
      </button>
      <button id="add-row" class="bg-emerald-600 px-6 py-3 rounded text-base min-h-[44px] min-w-[44px] flex-1 sm:flex-initial">Add Item</button>
    </div>
  </header>

  <main class="flex-1 p-4">
    <div class="mb-4 space-y-4">
      <!-- Search Input -->
      <div class="relative">
        <input 
          type="text" 
          id="search-input" 
          placeholder="Search all equipment data..." 
          class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg text-base min-h-[44px] focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
        />
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400">
          <path fill-rule="evenodd" d="M10.5 3.75a6.75 6.75 0 100 13.5 6.75 6.75 0 000-13.5zM2.25 10.5a8.25 8.25 0 1114.59 5.28l4.69 4.69a.75.75 0 11-1.06 1.06l-4.69-4.69A8.25 8.25 0 012.25 10.5z" clip-rule="evenodd" />
        </svg>
        <button 
          id="clear-search" 
          class="absolute right-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400 hover:text-gray-600 hidden"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
            <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zm-1.72 6.97a.75.75 0 10-1.06 1.06L10.94 12l-1.72 1.72a.75.75 0 101.06 1.06L12 13.06l1.72 1.72a.75.75 0 101.06-1.06L13.06 12l1.72-1.72a.75.75 0 10-1.06-1.06L12 10.94l-1.72-1.72z" clip-rule="evenodd" />
          </svg>
        </button>
      </div>
      
      <!-- Action Buttons -->
      <div class="flex gap-2 flex-col sm:flex-row">
        <button id="import-csv" class="bg-blue-600 text-white px-6 py-3 rounded text-base min-h-[44px] flex-1 sm:flex-initial">Import CSV</button>
        <button id="export-csv" class="bg-gray-700 text-white px-6 py-3 rounded text-base min-h-[44px] flex-1 sm:flex-initial">Export CSV</button>
        <button id="refresh" class="bg-white border px-6 py-3 rounded text-base min-h-[44px] flex-1 sm:flex-initial">Refresh</button>
      </div>
    </div>

    <div class="overflow-x-auto -mx-4 sm:mx-0">
      <table class="min-w-full bg-white rounded shadow">
        <thead class="bg-gray-200">
          <tr>
            <th class="py-3 px-2 sm:px-3 text-left text-sm font-medium">Equip</th>
            <th class="py-3 px-2 sm:px-3 text-left text-sm font-medium">Description</th>
            <th class="py-3 px-2 sm:px-3 text-left text-sm font-medium">VIN</th>
            <th class="py-3 px-2 sm:px-3 text-left text-sm font-medium">Job</th>
            <th class="py-3 px-2 sm:px-3 text-left text-sm font-medium">Status</th>
            <th class="py-3 px-2 sm:px-3 text-left text-sm font-medium">Location</th>
            <th class="py-3 px-2 sm:px-3 text-left text-sm font-medium w-32 sm:w-40">Actions</th>
          </tr>
        </thead>
        <tbody id="equipment-body"></tbody>
      </table>
    </div>
  </main>

  <input type="file" id="csv-input" accept=".csv" class="hidden" />

  <script>
    const SUPABASE_URL = "https://wltgwhprvydiqyybhcec.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsdGd3aHBydnlkaXF5eWJoY2VjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk3Nzg2NTAsImV4cCI6MjA3NTM1NDY1MH0.PWXYFBtplSZqDvE4MFejAkQzewp56KKNc1k2ZY7-tkE";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const tbody = document.getElementById('equipment-body');

    function escapeHtml(s){
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]))
    }

    async function fetchEquipment() {
      const { data, error } = await supabase.from('equipment').select('*').order('updated_at', { ascending: false });
      if (error) { console.error(error); return; }
      tbody.innerHTML = '';
      for (const item of data) {
        const tr = document.createElement('tr');
        tr.dataset.id = item.id;
        tr.innerHTML = `
          <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true">${escapeHtml(item.equip)}</td>
          <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true">${escapeHtml(item.description)}</td>
          <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true">${escapeHtml(item.vin)}</td>
          <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true">${escapeHtml(item.job)}</td>
          <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true">${escapeHtml(item.status_text)}</td>
          <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true">${escapeHtml(item.location)}</td>
          <td class='border px-2 sm:px-3 py-3'>
            <div class="flex flex-col sm:flex-row gap-2">
              <button class='save-btn bg-emerald-600 text-white px-3 py-2 rounded text-sm min-h-[40px] flex-1 sm:flex-initial'>Save</button>
              <button class='del-btn bg-red-600 text-white px-3 py-2 rounded text-sm min-h-[40px] flex-1 sm:flex-initial'>Delete</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      }
    }

    tbody.addEventListener('click', async (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const tr = e.target.closest('tr');
      const id = tr?.dataset?.id;
      const tds = tr.querySelectorAll('td[contenteditable]');
      const rec = {
        equip: tds[0]?.innerText.trim() || null,
        description: tds[1]?.innerText.trim() || null,
        vin: tds[2]?.innerText.trim() || null,
        job: tds[3]?.innerText.trim() || null,
        status_text: tds[4]?.innerText.trim() || null,
        location: tds[5]?.innerText.trim() || null,
        updated_at: new Date().toISOString(),
      };

      if (btn.classList.contains('save-btn')) {
        if (!id) {
          const { error } = await supabase.from('equipment').insert(rec);
          if (error) return alert('Create failed: ' + error.message);
          await fetchEquipment();
          return;
        } else {
          const { error } = await supabase.from('equipment').update(rec).eq('id', id);
          if (error) return alert('Update failed: ' + error.message);
          await fetchEquipment();
          return;
        }
      }

      if (btn.classList.contains('del-btn')) {
        if (!id) { tr.remove(); return; }
        if (!confirm('Delete this item?')) return;
        const { error } = await supabase.from('equipment').delete().eq('id', id);
        if (error) return alert('Delete failed: ' + error.message);
        tr.remove();
        return;
      }
    });

    document.getElementById('add-row').addEventListener('click', () => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true"></td>
        <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true"></td>
        <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true"></td>
        <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true"></td>
        <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true"></td>
        <td class='border px-2 sm:px-3 py-3 text-sm' contenteditable="true"></td>
        <td class='border px-2 sm:px-3 py-3'>
          <div class="flex flex-col sm:flex-row gap-2">
            <button class='save-btn bg-emerald-600 text-white px-3 py-2 rounded text-sm min-h-[40px] flex-1 sm:flex-initial'>Save</button>
            <button class='del-btn bg-red-600 text-white px-3 py-2 rounded text-sm min-h-[40px] flex-1 sm:flex-initial'>Delete</button>
          </div>
        </td>`;
      tbody.prepend(tr);
    });

    document.getElementById('refresh').addEventListener('click', fetchEquipment);

    document.getElementById('import-csv').addEventListener('click', () => {
      document.getElementById('csv-input').click();
    });

    document.getElementById('csv-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async function(results) {
          const rows = results.data.map(r => ({
            equip: r.equip || r.Equip,
            description: r.description || r.Description || r['Equip Description'],
            vin: r.vin || r.VIN || r.VINNumber,
            job: r.job || r.Job || r.Jobs,
            status_text: r.status_text || r.Status,
            location: r.location || r.Location || r.At,
          })).filter(x => x.equip);
          const { error } = await supabase.from('equipment').insert(rows);
          if (error) {
            alert('Error importing CSV: ' + error.message);
          } else {
            alert('Imported ' + rows.length + ' rows!');
            fetchEquipment();
          }
        }
      });
    });

    document.getElementById('export-csv').addEventListener('click', async () => {
      const { data, error } = await supabase.from('equipment').select('*').order('updated_at', { ascending: false });
      if (error) {
        alert('Export failed: ' + error.message);
        return;
      }
      const rows = data.map(r => ({
        Equip: r.equip,
        Description: r.description,
        VIN: r.vin,
        Job: r.job,
        Status: r.status_text,
        Location: r.location,
        Updated: r.updated_at,
      }));
      const csv = Papa.unparse(rows);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'equipment_export.csv';
      a.click();
      URL.revokeObjectURL(url);
    });

    fetchEquipment();

    // Search functionality
    const searchInput = document.getElementById('search-input');
    const clearSearchBtn = document.getElementById('clear-search');
    
    function highlightText(text, searchTerm) {
      if (!searchTerm) return text;
      const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(regex, '<span class="search-highlight">$1</span>');
    }
    
    function removeHighlights(element) {
      const highlights = element.querySelectorAll('.search-highlight');
      highlights.forEach(span => {
        const parent = span.parentNode;
        parent.replaceChild(document.createTextNode(span.textContent), span);
        parent.normalize();
      });
    }
    
    function performSearch() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      const rows = tbody.querySelectorAll('tr');
      
      // Show clear button if there's search text
      if (searchTerm) {
        clearSearchBtn.classList.remove('hidden');
      } else {
        clearSearchBtn.classList.add('hidden');
      }
      
      // Filter rows based on search term
      rows.forEach(row => {
        const editableCells = row.querySelectorAll('td[contenteditable="true"]');
        
        if (!searchTerm) {
          // Remove all highlights and show all rows
          editableCells.forEach(cell => removeHighlights(cell));
          row.style.display = '';
          return;
        }
        
        // Check if row matches search term
        let rowText = '';
        let hasMatch = false;
        
        editableCells.forEach(cell => {
          // Remove existing highlights first
          removeHighlights(cell);
          const cellText = cell.textContent.toLowerCase();
          rowText += ' ' + cellText;
          
          if (cellText.includes(searchTerm)) {
            hasMatch = true;
            // Add highlighting
            cell.innerHTML = highlightText(cell.textContent, searchTerm);
          }
        });
        
        // Show or hide row based on search match
        if (hasMatch) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      });
    }
    
    // Add event listeners for search
    searchInput.addEventListener('input', performSearch);
    searchInput.addEventListener('keyup', performSearch);
    
    // Clear search functionality
    clearSearchBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearSearchBtn.classList.add('hidden');
      performSearch();
      searchInput.focus();
    });
    
    // Re-run search after data is loaded
    const originalFetchEquipment = fetchEquipment;
    fetchEquipment = async function() {
      await originalFetchEquipment();
      // Re-apply search filter if there's a search term
      if (searchInput.value.trim()) {
        performSearch();
      }
    };

    // Header install button functionality
    const headerInstallBtn = document.getElementById('header-install-btn');
    
    function showHeaderInstallBtn() {
      if (headerInstallBtn && !localStorage.getItem('pwa-installed')) {
        headerInstallBtn.classList.remove('hidden');
      }
    }
    
    function hideHeaderInstallBtn() {
      if (headerInstallBtn) {
        headerInstallBtn.classList.add('hidden');
      }
    }
    
    if (headerInstallBtn) {
      headerInstallBtn.addEventListener('click', () => {
        if (deferredPrompt) {
          hideHeaderInstallBtn();
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('User accepted the install prompt from header');
              localStorage.setItem('pwa-installed', 'true');
            } else {
              setTimeout(showHeaderInstallBtn, 30000);
            }
            deferredPrompt = null;
          });
        } else {
          showIOSInstallInstructions();
        }
      });
    }

    // Register Service Worker for PWA functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(registration) {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, function(err) {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }

    // Add to home screen prompt - Enhanced mobile visibility
    let deferredPrompt;
    let installBtn;
    
    function createInstallButton() {
      if (installBtn) return; // Prevent duplicate buttons
      
      installBtn = document.createElement('button');
      installBtn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 inline mr-2">
          <path fill-rule="evenodd" d="M12 2.25a.75.75 0 01.75.75v11.69l3.22-3.22a.75.75 0 111.06 1.06l-4.5 4.5a.75.75 0 01-1.06 0l-4.5-4.5a.75.75 0 111.06-1.06l3.22 3.22V3a.75.75 0 01.75-.75z" clip-rule="evenodd" />
          <path fill-rule="evenodd" d="M3 15a.75.75 0 01.75-.75h16.5a.75.75 0 010 1.5H3.75A.75.75 0 013 15z" clip-rule="evenodd" />
        </svg>
        Download App
      `;
      installBtn.className = 'download-app-btn bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-full shadow-lg font-medium text-base min-h-[48px] flex items-center whitespace-nowrap transition-all duration-300 animate-pulse';
      installBtn.style.touchAction = 'manipulation';
      
      installBtn.addEventListener('click', () => {
        if (deferredPrompt) {
          installBtn.style.display = 'none';
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('User accepted the install prompt');
              localStorage.setItem('pwa-installed', 'true');
            } else {
              console.log('User dismissed the install prompt');
              // Show button again after 30 seconds if dismissed
              setTimeout(showInstallButton, 30000);
            }
            deferredPrompt = null;
          });
        } else {
          // Fallback for iOS and other browsers
          showIOSInstallInstructions();
        }
      });
      
      document.body.appendChild(installBtn);
    }
    
    function showInstallButton() {
      if (localStorage.getItem('pwa-installed') === 'true') return;
      if (!installBtn) createInstallButton();
      installBtn.style.display = 'flex';
      
      // Keep button visible longer on mobile
      setTimeout(() => {
        if (installBtn && installBtn.style.display !== 'none') {
          installBtn.classList.remove('animate-pulse');
          installBtn.style.opacity = '0.8';
        }
      }, 15000);
    }
    
    function showIOSInstallInstructions() {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      
      if (isIOS && isSafari) {
        alert('To install this app on iOS:\n\n1. Tap the Share button (⬆️)\n2. Scroll down and tap "Add to Home Screen"\n3. Tap "Add" to install');
      } else {
        alert('To install this app:\n\n• Android Chrome: Use "Add to Home Screen" from browser menu\n• Desktop: Look for install icon in address bar\n• Other browsers: Bookmark this page for quick access');
      }
    }
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Show both install buttons immediately on supported browsers
      showHeaderInstallBtn();
      setTimeout(showInstallButton, 2000);
    });
    
    // Show button for iOS and other browsers that don't support beforeinstallprompt
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (!deferredPrompt && !localStorage.getItem('pwa-installed')) {
          showHeaderInstallBtn();
          createInstallButton();
          showInstallButton();
        }
      }, 3000);
    });
    
    // Handle successful PWA installation
    window.addEventListener('appinstalled', (evt) => {
      console.log('PWA was installed');
      localStorage.setItem('pwa-installed', 'true');
      hideHeaderInstallBtn();
      if (installBtn) {
        installBtn.style.display = 'none';
      }
    });
  </script>
</body>
</html>
